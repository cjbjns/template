version: "4.1"
name: template
type: RISC-V
deviceName: null
packDir: null
srcDirs:
  - driver
  - link
  - platform/241/core
  - platform/241/startup
virtualFolder:
  name: <virtual_root>
  files:
    - path: src/main.c
    - path: src/stubs.c
  folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: 704b8cc0f11abe669efff4c3ea98caed
targets:
  Debug:
    cppPreprocessAttrs:
      defineList: []
      incList:
        - driver
        - platform/241/core
      libList: []
    excludeList: []
    toolchain: RISCV_GCC
    toolchainConfigMap:
      RISCV_GCC:
        linkerScriptPath: link/hm241_n208_link.ld
        options:
          version: 2
          afterBuildTasks:
            - name: new postbuild task
              abortAfterFailed: false
              command: echo build ${ProjectName}.lst & ${ToolchainRoot}//bin//${CompilerPrefix}objdump -t -T -S ${OutDir}//${ProjectName}.elf >${OutDir}//${ProjectName}.lst & echo file size & ${ToolchainRoot}//bin//${CompilerPrefix}size ${OutDir}//${ProjectName}.elf
              disable: false
          asm-compiler:
            ASM_FLAGS: -Wl,-Bstatic
          beforeBuildTasks: []
          c/cpp-compiler:
            C_FLAGS: -Wl,-Bstatic
            language-c: c11
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            abi: ilp32
            arch: rv32imac
            code-model: medlow
            misc-control: --specs=nosys.specs --specs=nano.specs
            output-debug-info: enable
          linker:
            $outputTaskExcludes:
              - .bin
            $toolName: auto
            LD_FLAGS: -Wl,--cref -Wl,--no-relax -nostartfiles
            output-format: elf
            remove-unused-input-sections: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: "null"
          vendor: "null"
        otherCmds: ""
        proType: 1
        speed: 8000
    uploader: JLink
